<form (ngSubmit)="onSubmit()">
  @if (errorMessage) {
    <div class="alert alert-danger py-2 mb-3 small">
      {{ errorMessage }}
    </div>
  }

  <div class="mb-3">
    <label class="form-label">Full Name</label>
    <input type="text" class="form-control" name="name" [(ngModel)]="form.name" required />
  </div>

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control" name="email" [(ngModel)]="form.email" required />
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <div class="input-group">
      <input
        [type]="showPassword ? 'text' : 'password'"
        class="form-control"
        name="password"
        [(ngModel)]="form.password"
        required />
      <button class="btn btn-outline-secondary" type="button" (click)="togglePassword()">
        {{ showPassword ? 'Hide' : 'Show' }}
      </button>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <input
      [type]="showPassword ? 'text' : 'password'"
      class="form-control"
      name="confirmPassword"
      [(ngModel)]="form.confirmPassword"
      required />
  </div>

  <button type="submit" class="btn btn-dark w-100">Continue -></button>
</form>
